{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="login-box">
        <h2>Login</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit">Login</button>
        </form>
    </div>
</div>

{% endblock %}
