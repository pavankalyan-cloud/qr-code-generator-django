<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | QR Code Generator</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:380px;
            background:#fff;
            padding:35px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,0.15);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        .form-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:15px;
        }

        button{
            width:100%;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0056b3;
        }

        .register{
            text-align:center;
            margin-top:20px;
        }

        .register a{
            text-decoration:none;
            color:#007bff;
            font-weight:bold;
        }

        .register a:hover{
            text-decoration:underline;
        }

        .error{
            color:red;
            text-align:center;
            margin-bottom:15px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Login</h2>

    {% if form.errors %}
        <div class="error">
            Invalid username or password.
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <button type="submit">Login</button>

    </form>

    <div class="register">
        Don't have an account?
        <a href="{% url 'register' %}">Register</a>
    </div>

</div>

</body>
</html>
