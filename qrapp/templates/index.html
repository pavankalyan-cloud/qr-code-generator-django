<!DOCTYPE html>
<html lang="en">
<head>
    <title>QR Generator</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            text-align: center;
            width: 350px;
            color: white;
            animation: fadeIn 1s ease-in-out;
        }

        input {
            width: 90%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
        }

        button {
            margin-top: 15px;
            padding: 12px 20px;
            border: none;
            background: #ff7eb3;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            background: #ff4e91;
        }

        img {
            margin-top: 20px;
            width: 160px;
            padding: 10px;
            background: white;
            border-radius: 10px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h1>QR Code Generator</h1>
    <p>Create beautiful QR codes instantly</p>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="data" placeholder="Enter text or URL" required>
        <br>
        <button type="submit">Generate QR</button>
    </form>

    {% if img %}
        <img src="{{ img.url }}">
        <br>
        <a href="{{ img.url }}" download>
            <button>Download QR</button>
        </a>
    {% endif %}
</div>

</body>
</html>
